name: NOVO CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy src tests

      - name: Pytest
        run: python -m pytest

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --filter @novo/frontend lint

      - name: Typecheck frontend
        run: pnpm --filter @novo/frontend typecheck

      - name: Build frontend
        run: pnpm --filter @novo/frontend build